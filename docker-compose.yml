services:
  echolens:
    build:
      context: .
      dockerfile: Dockerfile
    image: echolens:local
    env_file:
      - .env
    environment:
      DOUYIN_SOURCE_DIR: /data/douyin
      AUDIO_OUTPUT_DIR: /data/audio
      MYSQL_HOST: host.docker.internal
      REDIS_HOST: host.docker.internal
      HF_HOME: /models/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "D:/BaiduNetdiskDownload/dy src:/data/douyin:ro"
      - "D:/BaiduNetdiskDownload/dy out:/data/audio"
      - "echolens_model_cache:/models"
    command: ["scan"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: echolens:local
    env_file:
      - .env
    environment:
      DOUYIN_SOURCE_DIR: /data/douyin
      AUDIO_OUTPUT_DIR: /data/audio
      MYSQL_HOST: host.docker.internal
      REDIS_HOST: host.docker.internal
      HF_HOME: /models/huggingface
      API_HOST: 0.0.0.0
      API_PORT: 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "D:/BaiduNetdiskDownload/dy src:/data/douyin:ro"
      - "D:/BaiduNetdiskDownload/dy out:/data/audio"
      - "echolens_model_cache:/models"
    ports:
      - "8000:8000"
    command: ["api", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: echolens-frontend:local
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  echolens_model_cache:
