services:
  echolens:
    build:
      context: .
      dockerfile: Dockerfile
    image: echolens:local
    env_file:
      - .env
    environment:
      DOUYIN_SOURCE_DIR: /data/douyin
      AUDIO_OUTPUT_DIR: /data/audio
      SEMANTIC_INDEX_PATH: /data/semantic/echolens.sqlite3
      SEMANTIC_MODEL_CACHE_DIR: /models/fastembed
      MYSQL_HOST: host.docker.internal
      REDIS_HOST: host.docker.internal
      HF_HOME: /models/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "D:/BaiduNetdiskDownload/dy src:/data/douyin:ro"
      - "D:/BaiduNetdiskDownload/dy out:/data/audio"
      - "echolens_model_cache:/models"
      - "echolens_semantic_data:/data/semantic"
    command: ["scan"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: echolens:local
    env_file:
      - .env
    environment:
      DOUYIN_SOURCE_DIR: /data/douyin
      AUDIO_OUTPUT_DIR: /data/audio
      SEMANTIC_INDEX_PATH: /data/semantic/echolens.sqlite3
      SEMANTIC_MODEL_CACHE_DIR: /models/fastembed
      MYSQL_HOST: host.docker.internal
      REDIS_HOST: host.docker.internal
      HF_HOME: /models/huggingface
      API_HOST: 0.0.0.0
      API_PORT: 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "D:/BaiduNetdiskDownload/dy src:/data/douyin:ro"
      - "D:/BaiduNetdiskDownload/dy out:/data/audio"
      - "echolens_model_cache:/models"
      - "echolens_semantic_data:/data/semantic"
    ports:
      - "8099:8000"
    restart: unless-stopped
    command: ["api", "--host", "0.0.0.0", "--port", "8000"]

  job-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: echolens:local
    env_file:
      - .env
    environment:
      DOUYIN_SOURCE_DIR: /data/douyin
      AUDIO_OUTPUT_DIR: /data/audio
      SEMANTIC_INDEX_PATH: /data/semantic/echolens.sqlite3
      SEMANTIC_MODEL_CACHE_DIR: /models/fastembed
      MYSQL_HOST: host.docker.internal
      REDIS_HOST: host.docker.internal
      HF_HOME: /models/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "D:/BaiduNetdiskDownload/dy src:/data/douyin:ro"
      - "D:/BaiduNetdiskDownload/dy out:/data/audio"
      - "echolens_model_cache:/models"
      - "echolens_semantic_data:/data/semantic"
    restart: unless-stopped
    command: ["job-worker"]

volumes:
  echolens_model_cache:
  echolens_semantic_data:
